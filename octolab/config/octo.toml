# octolab runtime manifest. Points the builder at a directory of per-connector
# manifests; each <id>.toml's `type` is resolved to a registered factory.
#
# Loaded from octolab/main.rs:
#   Octo::builder()
#       .register_connector_type("telegram", octo_connector_telegram::factory())
#       .from_config_file(".../octolab/config/octo.toml")?
#
# (The petstore tool connector stays code-wired in main.rs with its payload
# registry; only the user-facing Telegram connector — which carries auth — is
# config-driven here.)

[runtime]
# bus_capacity = 1024   # optional; default is the builder's default

[connectors]
dir = "connectors"
