[workspace]
resolver = "2"
members = [
    "octo-core",
    "connectors/petstore",
    "connectors/http",
    "connectors/telegram",
    "octo-rig",
    "octolab",
]
# Keep `cargo test` (no --workspace) light — octo-rig/telegram/octolab pull the
# rig/LLM and teloxide trees.
default-members = [
    "octo-core",
    "connectors/petstore",
    "connectors/http",
]

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Octo contributors"]
repository = "https://github.com/lamantinai/octo"
rust-version = "1.85"

[workspace.dependencies]
tokio = { version = "1.40", features = ["sync", "rt", "macros", "time"] }
tokio-util = { version = "0.7", features = ["rt"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.10", features = ["v7", "serde"] }
thiserror = "2.0"
tracing = "0.1"
bytes = "1.7"
parking_lot = "0.12"
futures = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
toml = "0.8"
teloxide = "0.17"
